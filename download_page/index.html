<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0ea5e9">
    <title>应用下载 · Cloudrain</title>
    <meta name="description" content="Cloudrain 最新安卓 APK 下载，版本 1.3.1。">
    <meta property="og:title" content="Cloudrain 安卓 APK 下载">
    <meta property="og:description" content="Cloudrain 最新安卓 APK 下载，版本 1.3.1。">
    <meta property="og:image" content="icon.png">
    <meta property="og:type" content="website">
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container fade-in">
        <header class="header">
            <img src="icon.png" alt="应用图标" class="app-icon" />
            <div class="title-wrap">
                <h1 id="app-name" class="app-name">Cloudrain</h1>
            </div>
        </header>
        <main>
            <section class="info-cards">
                <div class="info-card">
                    <span class="label">最新版本</span>
                    <span class="value" id="version">1.3.1</span>
                </div>
                <div class="info-card">
                    <span class="label">更新日期</span>
                    <span class="value" id="update-date">2025-12-18</span>
                </div>
                <div class="info-card">
                    <span class="label">文件大小</span>
                    <span class="value" id="apk-size">计算中...</span>
                </div>
            </section>

            <div class="action-row">
                <a href="https://github.com/yanyan1115/NovelWriter/releases/download/v1.3.1/Cloudrain.apk" class="btn primary download-button">
                    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M5 20h14a1 1 0 0 0 1-1v-3h-2v2H6v-2H4v3a1 1 0 0 0 1 1zm7-3 5-5h-3V4h-4v8H7l5 5z" fill="currentColor"/></svg>
                    <span>下载 APK</span>
                </a>
            </div>

            <section class="changelog panel">
                <h2>更新日志</h2>
                <pre id="changelog-content">Cloudrain 1.3.1（2025-12-18）
- 体验优化：启动更快，动画更顺滑
- 易用性：设置项更清晰，交互更一致
- 稳定性：弱网下载更可靠，降低后台耗电
- 修复：修复若干已知问题与偶发崩溃
- 安全：更新依赖与权限文案</pre>
            </section>
        </main>
        <footer>
            <p>© 2025 Yanjun_Zhou · 保留所有权利</p>
        </footer>
    </div>

    <script>
    (() => {
      const link = document.querySelector('.download-button');
      const sizeEl = document.getElementById('apk-size');
      if (!link || !sizeEl) return;

      const downloadUrl = link.getAttribute('href');
      const apkName = downloadUrl.split('/').pop();
      const repoMatch = downloadUrl.match(/github\.com\/([^/]+)\/([^/]+)/);

      if (!apkName || !repoMatch) {
        sizeEl.textContent = '--';
        return;
      }

      const owner = repoMatch[1];
      const repo = repoMatch[2];
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/releases/latest`;

      const formatBytes = (bytes) => {
        if (!Number.isFinite(bytes) || bytes < 0) return null;
        if (bytes === 0) return '0 B';
        const units = ['B', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(1024));
        const val = bytes / Math.pow(1024, i);
        const digits = val >= 100 ? 0 : val >= 10 ? 1 : 2;
        return `${val.toFixed(digits)} ${units[i]}`;
      };

      (async () => {
        try {
          const response = await fetch(apiUrl, { cache: 'no-store' });
          if (!response.ok) throw new Error(`API request failed: ${response.status}`);
          
          const release = await response.json();
          const asset = release.assets.find(a => a.name === apkName);

          if (asset && typeof asset.size === 'number') {
            sizeEl.textContent = formatBytes(asset.size) || '--';
          } else {
            sizeEl.textContent = '未知';
          }
        } catch (e) {
          console.error('Failed to fetch APK size:', e);
          sizeEl.textContent = '--';
        }
      })();
    })();
    </script>
</body>
</html>
